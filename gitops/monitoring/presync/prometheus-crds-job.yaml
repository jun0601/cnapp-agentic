# PreSync 훅 — kube-prometheus-stack의 CRD(alertmanagers·prometheuses·prometheusagents·
# thanosrulers)를 Helm 차트 본 배포보다 "먼저" server-side apply로 설치한다.
#
# 왜 필요한가(2026-07-06 실 apply에서 실측한 근본 원인, troubleshooting.md 참고):
#   ① 이 CRD 4종은 OpenAPI 스키마가 커서 일반 kubectl apply(client-side, annotation 기반)의
#      262144바이트 제한을 넘는다 — ArgoCD가 기본 apply 전략으로 Helm 차트의 crds/를 넣으면
#      "metadata.annotations: Too long" 에러로 계속 실패한다(Application의 ServerSideApply=true
#      syncOption만으로는 이 4종 CRD의 최초 생성 실패를 못 막았음 — 실측 확인).
#   ② 더 심각한 문제: kube-prometheus-stack-operator 파드가 "CRD가 아직 없는 상태"로 먼저
#      떠버리면, 그 순간 "이 리소스 없음"을 내부에 캐싱하고 이후 CRD가 생겨도 재확인을 안 해서
#      Prometheus 커스텀 리소스를 영영 reconcile 안 한다(operator 재시작 전까지 조용히 멈춤).
#
# 이 Job을 PreSync(=Helm 차트 리소스보다 먼저 적용)로 실행하면 operator 파드가 뜰 때 CRD가
# 이미 존재/Established 상태라 위 두 문제가 애초에 발생하지 않는다.
#
# ⚠️ 버전 고정 중요: 아래 URL의 v0.75.2는 gitops/monitoring/kube-prometheus-stack-values.yaml이
#    참조하는 차트(kube-prometheus-stack 61.9.0)가 내부적으로 쓰는 prometheus-operator 버전과
#    반드시 일치해야 한다(안 맞으면 ArgoCD Application이 계속 OutOfSync로 남음 — 기능은 되지만
#    diff가 안 깨끗함, 2026-07-06 실측). app-monitoring.yaml의 차트 targetRevision을 올릴 때
#    이 버전도 함께 확인/갱신할 것(operator 파드 로그의 "Starting Prometheus Operator version=..."
#    으로 실제 버전 확인 가능).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-crd-installer
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-crd-installer
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-crd-installer
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
subjects:
  - kind: ServiceAccount
    name: prometheus-crd-installer
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus-crd-installer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: install-prometheus-operator-crds
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: prometheus-crd-installer
      restartPolicy: Never
      initContainers:
        - name: fetch-crds
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - >
              curl -fsSL -o /work/crds.yaml
              https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.75.2/stripped-down-crds.yaml
          volumeMounts:
            - name: work
              mountPath: /work
      containers:
        - name: apply-crds
          image: rancher/kubectl:v1.31.0
          command: ["kubectl", "apply", "--server-side", "--force-conflicts", "-f", "/work/crds.yaml"]
          volumeMounts:
            - name: work
              mountPath: /work
      volumes:
        - name: work
          emptyDir: {}
