# kube-prometheus-stack Helm values — infra/monitoring/README.md §1 하이브리드 설계의 "EKS 안" 절반.
#
# 무슨 역할:
#   ① Prometheus(node-exporter·kube-state-metrics·cAdvisor)로 EKS 안(파드·노드) 관측.
#   ② Grafana의 기본 데이터소스 = Prometheus(자동), 추가 데이터소스 = CloudWatch(EKS 밖:
#      Lambda·RDS·SQS·ALB·Step Functions·S3·Bedrock·Cognito) — infra/monitoring이 만든
#      IRSA 역할(grafana_irsa_role_arn)로 Grafana ServiceAccount가 직접 CloudWatch를 읽는다.
#
# ⚠️ 아래 role-arn·네임스페이스·serviceAccount 이름은 infra/monitoring/variables.tf의
#    grafana_namespace("monitoring")·grafana_service_account("kube-prometheus-stack-grafana")와
#    반드시 일치해야 한다(IRSA trust policy의 sub 조건이 이 조합으로 고정돼 있음, main.tf 참고).
#    role-arn 자체는 IAM 역할 이름이 고정값이라(랜덤 접미사 없음) apply→destroy를 반복해도
#    바뀌지 않는다 — 이 파일을 다시 쓸 필요 없이 계속 유효하다.

grafana:
  serviceAccount:
    create: true
    name: kube-prometheus-stack-grafana # release name "kube-prometheus-stack" + 차트 기본 규칙
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::066107819776:role/cnapp-agentic-monitoring-grafana-irsa"

  # admin 로그인 비밀번호 — 차트 기본값(prom-operator, 공개적으로 알려진 값)을 쓰던 걸
  # 전용 랜덤 비밀번호로 교체(그라파나가 커스텀 도메인으로 외부 공개돼 있어 필요).
  # k8s Secret "grafana-admin-credentials"(monitoring ns, out-of-band 생성·git 미커밋)를
  # 참조만 함 — Grafana UI에서 직접 바꾸면 ArgoCD self-heal이 되돌리니 이 경로로만 변경할 것.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  # RDS Postgres 데이터소스 접속 비밀번호 — k8s Secret "grafana-pg-datasource"(monitoring ns,
  # out-of-band로 생성·git 미커밋)를 env로 주입 → 아래 additionalDataSources가 $__env{}로 참조.
  # 비밀번호는 grafana_readonly 전용 계정(SELECT-only, infra/shared/db/schema.sql 6테이블) —
  # RDS 마스터 계정 아님(최소권한). 시크릿 재발급 시 이 Deployment만 재시작하면 자동 반영.
  envFromSecret: grafana-pg-datasource

  # Prometheus는 차트가 자동으로 기본 데이터소스로 등록 — CloudWatch·Postgres 추가.
  additionalDataSources:
    - name: CloudWatch
      type: cloudwatch
      access: proxy
      # uid 고정 — 안 정하면 apply마다 랜덤 uid가 생겨서(destroy→재apply 시 값이 바뀜)
      # gitops/monitoring/dashboards/의 대시보드 JSON이 참조하는 datasource uid가 깨진다.
      uid: cloudwatch-monitoring
      jsonData:
        authType: default # IRSA(위 role-arn)로 자동 인증 — 액세스키 불필요
        defaultRegion: ap-northeast-2
    - name: PostgreSQL
      type: postgres
      access: proxy
      uid: postgres-cnapp
      # host/user/dbname은 민감정보 아님(RDS는 private subnet+SG로 격리, 계정도 SELECT-only) —
      # 값 자체는 하드코딩, 비밀번호만 envFromSecret(PG_PASSWORD)로 분리.
      url: "cnapp-agentic-pgvector.cteocouieix7.ap-northeast-2.rds.amazonaws.com:5432"
      database: cnapp
      user: grafana_readonly
      secureJsonData:
        password: "$__env{PG_PASSWORD}"
      jsonData:
        sslmode: require
        postgresVersion: 1600 # RDS PostgreSQL 16.x

  # 데모 규모(비용 규율) — 영구볼륨 없이 파드 재시작 시 대시보드 정의는 그대로(ConfigMap
  # 프로비저닝, 아래 dashboardProviders)라 무방. 로그인 정보만 데모용 기본값.
  persistence:
    enabled: false
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 200m, memory: 256Mi }

# Prometheus 서버 — 데모 규모(소형 spot 노드, infra/shared) 기준 최소 리소스·짧은 보존.
# 영구볼륨 미사용 = apply/destroy 사이클마다 과거 데이터는 사라짐(원래 CloudWatch가 진짜
# 장기 보존소, Prometheus는 EKS 안 실시간 관측용 — README §1 원칙과 일치).
prometheus:
  prometheusSpec:
    retention: 6h
    # 2026-07-07: 512Mi 한도로 OOMKilled 실측(장시간 가동+ServiceMonitor 추가 후 재로딩 중 터짐) — 1Gi로 상향.
    resources:
      requests: { cpu: 100m, memory: 384Mi }
      limits: { cpu: 500m, memory: 1Gi }
    storageSpec: {} # emptyDir(기본) — PVC/StorageClass 프로비저닝 불필요

alertmanager:
  # CloudWatch Alarms → SNS → Teams(infra/monitoring §11)가 이미 알림 경로를 커버 —
  # 인클러스터 Alertmanager 중복 방지, 리소스도 아낌(비용 규율).
  enabled: false

# kube-state-metrics 기본값은 카디널리티 보호로 kube_node_labels에 실제 라벨값을 안 실어줌
# (메트릭 자체는 나오지만 label_* 필드가 비어 join이 안 됨) — 노드가 상시 관리형 노드그룹인지
# Karpenter 스팟인지 대시보드에서 구분하기 위해 필요한 라벨 3개만 명시적으로 허용.
# (Grafana 통합 대시보드 EKS 개요, cnapp-eks-dashboard.yaml의 노드별 CPU/메모리 패널이 이걸로 join)
kube-state-metrics:
  metricLabelsAllowlist:
    - "nodes=[eks.amazonaws.com/nodegroup,karpenter.sh/nodepool,karpenter.sh/capacity-type]"

# node-exporter는 기본값 그대로(경량, 이 스택의 핵심 관측 소스).
