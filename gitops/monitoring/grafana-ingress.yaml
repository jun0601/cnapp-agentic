# Grafana를 grafana.cnapp-agentic.cloud로 노출(2026-07-07 추가).
# AWS Load Balancer Controller가 이 Ingress를 보고 전용 ALB를 자동 생성·관리한다
# (target-type=ip라 파드 IP를 직접 등록 — Karpenter로 노드가 계속 바뀌어도 문제없음).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # ⚠️ monitoring 재apply 시 ACM 인증서가 새로 발급돼 ARN이 바뀜 — aws acm list-certificates로 확인 후 갱신
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:066107819776:certificate/3a028d6d-bd19-4342-9feb-7f230d22e86e
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
spec:
  rules:
    - host: grafana.cnapp-agentic.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
