# Grafana를 grafana.cnapp-agentic.cloud로 노출(2026-07-07 추가).
# AWS Load Balancer Controller가 이 Ingress를 보고 전용 ALB를 자동 생성·관리한다
# (target-type=ip라 파드 IP를 직접 등록 — Karpenter로 노드가 계속 바뀌어도 문제없음).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # certificate-arn은 일부러 안 박음 — 컨트롤러가 host(grafana.cnapp-agentic.cloud)와
    # 도메인이 일치하는 ISSUED ACM 인증서를 자동 발견해 붙임(monitoring 재apply로 인증서가
    # 새로 발급돼 ARN이 바뀌어도 stale 문제 없음). 예전엔 옛 ARN이 박혀 CertificateNotFound로 깨졌었음.
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
spec:
  rules:
    - host: grafana.cnapp-agentic.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
