apiVersion: v1
kind: ConfigMap
metadata:
  name: cnapp-eks-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  eks-overview.json: |
    {
      "id": null,
      "uid": "cnapp-eks",
      "title": "CNAPP - EKS 개요",
      "tags": [
        "cnapp-agentic",
        "eks"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "노드 수",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(kube_node_info)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "value"
          },
          "id": 1
        },
        {
          "type": "stat",
          "title": "파드 수",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(kube_pod_info)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "value"
          },
          "id": 2
        },
        {
          "type": "stat",
          "title": "비정상 파드 수",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(kube_pod_status_phase{phase!=\"Running\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "value"
          },
          "id": 3
        },
        {
          "type": "stat",
          "title": "네임스페이스 수",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count(count by (namespace) (kube_pod_info))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "value"
          },
          "id": 4
        },
        {
          "type": "timeseries",
          "title": "노드별 CPU 사용률(%)",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "id": 5
        },
        {
          "type": "timeseries",
          "title": "노드별 메모리 사용률(%)",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "id": 6
        },
        {
          "type": "timeseries",
          "title": "네임스페이스별 파드 재시작 횟수(1h 증가량)",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (namespace) (increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "id": 7
        },
        {
          "type": "timeseries",
          "title": "파드별 CPU 사용률 top10",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "topk(10, sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[5m])))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "id": 8
        },
        {
          "type": "timeseries",
          "title": "파드별 메모리 사용량 top10",
          "gridPos": {
            "x": 12,
            "y": 20,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "topk(10, sum by (pod, namespace) (container_memory_working_set_bytes{container!=\"\",container!=\"POD\"}))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "id": 9
        },
        {
          "type": "timeseries",
          "title": "노드별 파드 개수(bin-packing)",
          "gridPos": {
            "x": 0,
            "y": 28,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "count by (node) (kube_pod_info)",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "id": 10
        },
        {
          "type": "timeseries",
          "title": "비정상 파드 목록(이름·상태)",
          "gridPos": {
            "x": 12,
            "y": 28,
            "w": 12,
            "h": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "kube_pod_status_phase{phase=~\"Pending|Failed|Unknown\"} == 1",
              "legendFormat": "{{namespace}}/{{pod}} ({{phase}})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "id": 11
        }
      ]
    }
