# HPA — 파드층 오토스케일러(replica 수를 부하로 조절). 노드층(Karpenter)과 2층 구조.
#   부하↑ → HPA가 replica↑ → 스케줄 못 하는 파드 발생 → Karpenter가 노드 provisioning.
#   부하↓ → HPA가 replica↓ → 노드 저활용 → Karpenter consolidation으로 노드 정리.
# 전제: metrics-server 설치(kubectl top 동작). 완전 파드 scale-to-zero는 KEDA 필요(데모엔 오버스펙).
# 여기선 member·product 예시. order도 동일 패턴.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: member
  namespace: shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: member
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product
  namespace: shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
