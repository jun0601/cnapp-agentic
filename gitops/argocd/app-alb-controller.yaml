apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: "1.13.0"
    helm:
      releaseName: aws-load-balancer-controller
      values: |
        clusterName: cnapp-agentic-shared
        region: ap-northeast-2
        replicaCount: 1 # 프리티어 파드밀도 절약(데모라 HA 불필요) — external-dns 등 슬롯 확보
        # vpcId는 일부러 안 박음 — 컨트롤러가 노드 IMDS에서 자동 발견(shared 재apply로 VPC가
        # 새로 생겨도 하드코딩 stale 문제가 없음). 예전엔 옛 VPC ID가 박혀 "0 subnets"로 깨졌었음.
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::066107819776:role/cnapp-agentic-alb-controller-irsa
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { cpu: 200m, memory: 256Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
