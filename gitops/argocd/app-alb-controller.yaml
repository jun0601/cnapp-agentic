apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: "1.13.0"
    helm:
      releaseName: aws-load-balancer-controller
      values: |
        clusterName: cnapp-agentic-shared
        region: ap-northeast-2
        replicaCount: 1 # 프리티어 파드밀도 절약(데모라 HA 불필요) — external-dns 등 슬롯 확보
        # ⚠️ vpcId 명시 필수(2026-07-10 재확인) — 한때 "노드 IMDS 자동발견"으로 빼봤으나,
        # 이 클러스터 EC2가 IMDSv2 하드닝(HttpPutResponseHopLimit=1)이라 파드 네트워크
        # 네임스페이스에서 IMDS 홉이 초과돼 "context deadline exceeded"로 컨트롤러가 크래시함
        # (hop-limit은 의도된 보안 설정이라 여기서 안 건드림 — infra/shared 소유).
        # shared 재apply로 VPC가 재생성되면 여기 값을 aws ec2 describe-vpcs로 갱신할 것.
        vpcId: vpc-0858061ad2e0038b3
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::066107819776:role/cnapp-agentic-alb-controller-irsa
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { cpu: 200m, memory: 256Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
