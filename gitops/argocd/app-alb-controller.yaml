apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: "1.13.0"
    helm:
      releaseName: aws-load-balancer-controller
      values: |
        clusterName: cnapp-agentic-shared
        region: ap-northeast-2
        vpcId: vpc-0fffbd05dd989613a # ⚠️ shared 재apply 시 VPC ID 바뀜 — kubectl 없으면 aws ec2 describe-vpcs로 확인 후 갱신
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::066107819776:role/cnapp-agentic-alb-controller-irsa
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { cpu: 200m, memory: 256Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
