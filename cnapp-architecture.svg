<svg viewBox="0 0 1400 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1130" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">멀티클라우드 CNAPP + 에이전틱 AI</text>
  <text x="700" y="62" text-anchor="middle" font-size="14" fill="#64748b">AWS = 워크로드의 주인 · Azure = 신원의 주인 — 공격이 두 클라우드를 넘는 경로를 추적하는 에이전틱 CNAPP</text>
  <!-- ================= 목적 띠 (왜 만드나 / 뭘 파악하나 / 최종 목적) ================= -->
  <rect x="40" y="80" width="1320" height="118" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>

  <rect x="58" y="96" width="300" height="86" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="208" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">무엇을 점검 대상으로</text>
  <text x="208" y="140" text-anchor="middle" font-size="10.5" fill="#3730a3">고객사 워크로드</text>
  <text x="208" y="157" text-anchor="middle" font-size="10.5" fill="#3730a3">AWS 커머스 + Azure</text>
  <text x="208" y="174" text-anchor="middle" font-size="10.5" fill="#3730a3">신원(Entra) — 분산 환경</text>

  <text x="372" y="143" font-size="20" fill="#6366f1">→</text>

  <rect x="392" y="96" width="330" height="86" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="557" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">무엇을 파악하나 (6가지)</text>
  <text x="557" y="137" text-anchor="middle" font-size="10" fill="#3730a3">설정(CSPM) · 권한(CIEM) · 취약점</text>
  <text x="557" y="153" text-anchor="middle" font-size="10" fill="#3730a3">쿠버네티스(KSPM) · 데이터(노출)</text>
  <text x="557" y="172" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4338ca">+ 공격 경로(attack-path)</text>

  <text x="736" y="143" font-size="20" fill="#6366f1">→</text>

  <rect x="756" y="96" width="300" height="86" rx="8" fill="#fff" stroke="#a5b4fc"/>
  <text x="906" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">왜 관제 앱을 구축</text>
  <text x="906" y="137" text-anchor="middle" font-size="10.5" fill="#3730a3">흩어진 위험을 한 화면 통합</text>
  <text x="906" y="154" text-anchor="middle" font-size="10.5" fill="#3730a3">+ AI가 설명·우선순위·조치</text>
  <text x="906" y="173" text-anchor="middle" font-size="10" fill="#6366f1">(사람이 일일이 못 보니까)</text>

  <text x="1070" y="143" font-size="20" fill="#dc2626">→</text>

  <rect x="1090" y="96" width="252" height="86" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="1216" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">최종 목적</text>
  <text x="1216" y="141" text-anchor="middle" font-size="10.5" fill="#991b1b">단일 도구로 안 보이는</text>
  <text x="1216" y="158" text-anchor="middle" font-size="10.5" fill="#991b1b">크로스클라우드 공격 경로를</text>
  <text x="1216" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">터지기 전에 찾아 막는다</text>


  <!-- ================= ROW 1: 시나리오 + 앱 2개 ================= -->
  <text x="40" y="230" font-size="15" font-weight="700" fill="#0f172a">① 시나리오 · 앱 2개 (둘은 직접 통신 안 함 = agentless)</text>

  <!-- 타깃 앱 -->
  <rect x="40" y="245" width="600" height="150" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="40" y="245" width="600" height="28" rx="10" fill="#f59e0b"/>
  <rect x="40" y="259" width="600" height="14" fill="#f59e0b"/>
  <text x="56" y="264" font-size="14" font-weight="700" fill="#fff">타깃 앱 — 고객사 워크로드 (일부러 취약 · findings 소스)</text>

  <rect x="58" y="285" width="180" height="95" rx="7" fill="#fff7ed" stroke="#fdba74"/>
  <text x="148" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">AWS — 커머스 3서비스</text>
  <text x="148" y="326" text-anchor="middle" font-size="11" fill="#7c2d12">product (취약 이미지)</text>
  <text x="148" y="344" text-anchor="middle" font-size="11" fill="#7c2d12">order (과도 IRSA 권한)</text>
  <text x="148" y="362" text-anchor="middle" font-size="11" fill="#7c2d12">member (공개 S3 · PII)</text>

  <rect x="252" y="285" width="170" height="95" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="337" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Azure — 신원</text>
  <text x="337" y="330" text-anchor="middle" font-size="11" fill="#1e3a8a">Entra ID (직원 신원)</text>
  <text x="337" y="348" text-anchor="middle" font-size="11" fill="#1e3a8a">과도권한 앱 (공격 종착지)</text>

  <rect x="436" y="285" width="188" height="95" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="530" y="308" text-anchor="middle" font-size="11" fill="#475569">자기가 점검당하는 줄</text>
  <text x="530" y="326" text-anchor="middle" font-size="11" fill="#475569">모름. 그냥 클라우드에</text>
  <text x="530" y="344" text-anchor="middle" font-size="11" fill="#475569">배포되어 돌아갈 뿐.</text>
  <text x="530" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">결함은 IaC(설정)에 심음</text>

  <!-- 관제 앱 -->
  <rect x="760" y="245" width="600" height="150" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="760" y="245" width="600" height="28" rx="10" fill="#0ea5e9"/>
  <rect x="760" y="259" width="600" height="14" fill="#0ea5e9"/>
  <text x="776" y="264" font-size="14" font-weight="700" fill="#fff">관제 앱 — 우리 플랫폼 (얼굴 · HALO의 NOVA 대응)</text>

  <rect x="778" y="285" width="270" height="95" rx="7" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="913" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">통합 관제 대시보드</text>
  <text x="913" y="328" text-anchor="middle" font-size="11" fill="#075985">AWS+Azure 점수 나란히</text>
  <text x="913" y="346" text-anchor="middle" font-size="11" fill="#075985">findings · attack-path</text>
  <text x="913" y="364" text-anchor="middle" font-size="11" fill="#075985">AI 설명 · 우선순위 · 조치</text>

  <rect x="1062" y="285" width="280" height="95" rx="7" fill="#f0f9ff" stroke="#7dd3fc"/>
  <text x="1202" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">여기에 들어가는 것</text>
  <text x="1202" y="328" text-anchor="middle" font-size="11" fill="#075985">Bedrock 에이전틱 AI</text>
  <text x="1202" y="346" text-anchor="middle" font-size="11" fill="#075985">SSO (Entra→Cognito)</text>
  <text x="1202" y="364" text-anchor="middle" font-size="11" fill="#075985">findings 저장소 "읽기만"</text>

  <!-- agentless 경계 화살표 -->
  <line x1="640" y1="435" x2="760" y2="435" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="700" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">★ 직접 API 없음</text>
  <text x="700" y="452" text-anchor="middle" font-size="10" fill="#dc2626">(agentless · read-only 스캔)</text>

  <!-- ================= ROW 2: 데이터 흐름 ================= -->
  <text x="40" y="490" font-size="15" font-weight="700" fill="#0f172a">② 데이터 흐름 — 스캐너가 계정을 read-only 스캔 → 정규화 → 에이전틱 엔진(RAG) → 관제 앱</text>

  <!-- 입력: 스캐너 -->
  <rect x="40" y="508" width="300" height="180" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="56" y="530" font-size="12" font-weight="700" fill="#92400e">입력 · 스캐너 (read-only)</text>
  <text x="56" y="552" font-size="10.5" fill="#78350f">설정/데이터: Config · Security Hub · Prowler · Macie(S3전용)</text>
  <text x="56" y="572" font-size="10.5" fill="#78350f">워크로드: Inspector · Trivy · kube-bench</text>
  <text x="56" y="592" font-size="10.5" fill="#78350f">권한(CIEM): IAM Access Analyzer</text>
  <text x="56" y="612" font-size="10.5" fill="#1e40af">Azure: Prowler 모드(Entra CIEM · Defender)</text>
  <line x1="56" y1="625" x2="324" y2="625" stroke="#fcd34d" stroke-dasharray="3 3"/>
  <text x="56" y="644" font-size="10.5" font-weight="700" fill="#92400e">빌드게이트(Shift-Left):</text>
  <text x="56" y="662" font-size="10.5" fill="#78350f">CI에서 Checkov/OPA(IaC) · Trivy(이미지)</text>
  <text x="56" y="680" font-size="10" fill="#a16207">→ 배포 전 차단</text>

  <line x1="340" y1="578" x2="392" y2="578" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 정규화 -->
  <rect x="394" y="538" width="150" height="80" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="469" y="568" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">정규화</text>
  <text x="469" y="586" text-anchor="middle" font-size="10" fill="#64748b">OCSF-lite (계약①)</text>
  <text x="469" y="602" text-anchor="middle" font-size="9.5" fill="#94a3b8">이질적 데이터 → 한 포맷</text>
  <text x="469" y="635" text-anchor="middle" font-size="9.5" fill="#64748b">EventBridge→SQS→Lambda</text>

  <line x1="544" y1="578" x2="596" y2="578" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 에이전틱 엔진 -->
  <rect x="598" y="518" width="420" height="170" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="614" y="540" font-size="12" font-weight="700" fill="#7e22ce">공유 에이전틱 엔진 (Bedrock 멀티에이전트)</text>
  <text x="1002" y="540" text-anchor="end" font-size="10" font-weight="700" fill="#9333ea">Triage 게이트 · Haiku/Sonnet 배분</text>
  <rect x="614" y="552" width="388" height="40" rx="6" fill="#fff" stroke="#d8b4fe"/>
  <text x="808" y="577" text-anchor="middle" font-size="11" fill="#6b21a8">Orchestrator → Triage → Hypothesis → Evidence → Reasoning</text>

  <!-- RAG 루프 -->
  <rect x="614" y="602" width="184" height="76" rx="7" fill="#fff" stroke="#c084fc"/>
  <text x="706" y="621" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7e22ce">RAG 루프</text>
  <text x="706" y="639" text-anchor="middle" font-size="9.5" fill="#6b21a8">finding → 임베딩 →</text>
  <text x="706" y="654" text-anchor="middle" font-size="9.5" fill="#6b21a8">pgvector 검색 → 근거</text>
  <text x="706" y="669" text-anchor="middle" font-size="9.5" fill="#6b21a8">+ finding → LLM 답변</text>

  <rect x="812" y="602" width="190" height="76" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="907" y="621" text-anchor="middle" font-size="10.5" font-weight="700" fill="#047857">pgvector (RDS t3.micro)</text>
  <text x="907" y="639" text-anchor="middle" font-size="9.5" fill="#065f46">CIS·ISMS-P·플레이북</text>
  <text x="907" y="654" text-anchor="middle" font-size="9.5" fill="#065f46">(미리 임베딩해 저장)</text>
  <text x="907" y="669" text-anchor="middle" font-size="9.5" fill="#065f46">+ findings 데이터 동거</text>

  <line x1="798" y1="640" x2="810" y2="640" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="810" y1="654" x2="800" y2="654" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 엔진 → 출력 -->
  <line x1="808" y1="688" x2="808" y2="715" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- attack-path + HITL -->
  <rect x="1042" y="518" width="318" height="170" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="1058" y="540" font-size="12" font-weight="700" fill="#b91c1c">attack-path + 조치</text>
  <text x="1058" y="562" font-size="10.5" fill="#991b1b">AWS 권한+취약점+설정 → Azure 신원</text>
  <text x="1058" y="579" font-size="10.5" fill="#991b1b">→ 크로스클라우드 탈취 경로</text>
  <line x1="1058" y1="592" x2="1344" y2="592" stroke="#fca5a5" stroke-dasharray="3 3"/>
  <text x="1058" y="613" font-size="10.5" font-weight="700" fill="#b91c1c">위험 → AI 개선 제안</text>
  <text x="1058" y="631" font-size="10.5" fill="#991b1b">→ 사람 승인(HITL)</text>
  <text x="1058" y="649" font-size="10.5" fill="#991b1b">→ Step Functions 실행</text>
  <text x="1058" y="667" font-size="10.5" fill="#991b1b">→ 불변 감사로그(Object Lock)</text>

  <!-- 출력: 관제앱 연결 -->
  <rect x="598" y="715" width="420" height="40" rx="8" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="808" y="740" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">→ 관제 앱이 findings 저장소를 "읽어서" 화면에 표시 (위 ① 관제 앱)</text>
  <line x1="808" y1="395" x2="808" y2="410" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- ================= ROW 3: 골든 attack-path ================= -->
  <text x="40" y="798" font-size="15" font-weight="700" fill="#0f172a">③ 골든 시나리오 — 단일 finding은 "중간 위험", 묶으면 "Critical 탈취 경로"</text>

  <!-- step 1 -->
  <rect x="40" y="815" width="250" height="80" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="56" y="838" font-size="12" font-weight="700" fill="#9a3412">[1] product 침투</text>
  <text x="56" y="858" font-size="10.5" fill="#7c2d12">취약 이미지(KEV CVE)로 진입</text>
  <text x="56" y="876" font-size="10.5" fill="#7c2d12">Pod Security 위반 → 권한 확대</text>
  <line x1="290" y1="855" x2="328" y2="855" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- step 2 -->
  <rect x="330" y="815" width="250" height="80" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="346" y="838" font-size="12" font-weight="700" fill="#9a3412">[2] order 권한+자격증명</text>
  <text x="346" y="858" font-size="10.5" fill="#7c2d12">과도 IRSA 권한(s3:*) 탈취</text>
  <text x="346" y="876" font-size="10.5" fill="#7c2d12">+ 평문 시크릿서 Azure 키 발견</text>
  <line x1="580" y1="855" x2="618" y2="855" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- step 3 -->
  <rect x="620" y="815" width="250" height="80" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="636" y="838" font-size="12" font-weight="700" fill="#9a3412">[3] member 데이터 탈취</text>
  <text x="636" y="858" font-size="10.5" fill="#7c2d12">공개 S3 버킷 접근</text>
  <text x="636" y="876" font-size="10.5" fill="#7c2d12">→ AWS PII 탈취 (Macie가 탐지)</text>
  <line x1="870" y1="855" x2="908" y2="855" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- step 4 -->
  <rect x="910" y="815" width="270" height="80" rx="9" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="926" y="838" font-size="12" font-weight="700" fill="#1e40af">[4] Azure 신원 장악</text>
  <text x="926" y="858" font-size="10.5" fill="#1e3a8a">탈취한 자격증명으로 Entra ID</text>
  <text x="926" y="876" font-size="10.5" fill="#1e3a8a">→ 신원 시스템 장악 (Entra CIEM)</text>

  <rect x="1200" y="815" width="160" height="80" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1280" y="842" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">= Critical</text>
  <text x="1280" y="862" text-anchor="middle" font-size="10" fill="#991b1b">AWS→Azure</text>
  <text x="1280" y="879" text-anchor="middle" font-size="10" fill="#991b1b">전체 통제권 탈취</text>

  <!-- ================= ROW 4: 차별점 + 원칙 ================= -->
  <rect x="40" y="920" width="660" height="175" rx="10" fill="#fff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="56" y="943" font-size="14" font-weight="700" fill="#7e22ce">핵심 차별점</text>

  <rect x="56" y="954" width="628" height="48" rx="7" fill="#faf5ff"/>
  <text x="66" y="973" font-size="11.5" font-weight="700" fill="#6b21a8">★★★ 에이전틱 AI 능동 조사</text>
  <text x="66" y="992" font-size="10.5" fill="#7e22ce">챗봇 아님. LLM이 read-only API를 스스로 호출해 증거 수집(tool use). 일반 CNAPP AI는 설명만.</text>

  <rect x="56" y="1008" width="628" height="40" rx="7" fill="#faf5ff"/>
  <text x="66" y="1033" font-size="11.5" font-weight="700" fill="#6b21a8">★★★ 크로스클라우드 attack-path</text>
  <text x="430" y="1033" font-size="10.5" fill="#7e22ce">— AWS 워크로드 침해가 Azure 신원 장악으로 번지는 경로</text>

  <text x="66" y="1070" font-size="10.5" fill="#64748b">★★☆ 한국 규제 네이티브(ISMS-P/CSAP) · 오픈소스 투명성(Prowler/Trivy) · Code-to-Cloud(Shift-Left)</text>
  <text x="66" y="1088" font-size="9.5" fill="#94a3b8">HALO를 레퍼런스로 출발 — "더 낫다"가 아니라 HALO가 약한 영역(능동조사·크로스클라우드·Shift-Left)을 다른 관점으로</text>

  <rect x="720" y="920" width="640" height="175" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="736" y="943" font-size="14" font-weight="700" fill="#047857">안전 · 비용 원칙</text>
  <text x="736" y="970" font-size="11" fill="#065f46">● Read-only first + HITL — 에이전트는 조회만, 변경은 사람 승인 후 분리된 경로</text>
  <text x="736" y="994" font-size="11" fill="#065f46">● 불변 감사로그 — 모든 판정을 S3 Object Lock에 기록</text>
  <text x="736" y="1018" font-size="11" fill="#065f46">● 키 없는 인증 — CI/CD는 GitHub OIDC, 파드는 IRSA (장기 키 없음)</text>
  <text x="736" y="1042" font-size="11" fill="#065f46">● 무료 티어 가드레일 — Organizations/Identity Center 안 켬(크레딧 소멸 방지)</text>
  <text x="736" y="1066" font-size="11" fill="#065f46">   종량제 서비스는 데모만 켜고 destroy · Budgets $50/$100 알림</text>

