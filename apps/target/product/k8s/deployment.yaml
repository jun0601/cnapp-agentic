# product Deployment — 골든 시나리오 '진입점'.
# 의도적 결함 f2 (INTERNAL-KSPM-PRIVILEGED-001): privileged + hostPath.
#   kube-bench / trivy-k8s(KSPM)가 이 파드를 탐지.
#   ⚠️ 데모 전용 결함. 실서비스 금지. 토글 = 이 매니페스트 적용 여부.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: shop
  labels: { app: product }
spec:
  replicas: 2 # 스팟 복원력: 2 replica 분산 + PDB minAvailable 1
  selector:
    matchLabels: { app: product }
  template:
    metadata:
      labels: { app: product }
    spec:
      # 스팟 회수 복원력: 노드 분산(ScheduleAnyway = 1노드여도 스케줄 허용, 강제 증설 방지=비용).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: product }
      containers:
        - name: product
          # f1: KEV 취약 이미지(product/Dockerfile로 빌드, build-images.yml이 push)
          image: "066107819776.dkr.ecr.ap-northeast-2.amazonaws.com/cnapp-agentic/product:latest"
          # keep-alive는 이미지 CMD(`CMD ["sleep", "infinity"]`)가 담당한다.
          #   (product는 '스캔 대상 취약 이미지'가 목적이지 기능 서비스가 아니라 placeholder로 떠 있음)
          # 2026-07-06~07-21 사이엔 여기 `command: ["sleep","infinity"]` 오버라이드가 있었다 —
          # 당시 ECR 이미지가 Dockerfile exec-form 함정(JSON 배열 뒤 인라인 주석 → shell-form 폴백)으로
          # CMD가 깨져 있어서 매니페스트에서 우회한 것. Dockerfile은 그때 고쳤고 이미지도 재빌드됐으므로
          # (build-images.yml), 오버라이드는 역할이 끝나 제거한다. 동작은 동일(둘 다 sleep infinity).
          ports: [{ containerPort: 8080 }]
          # HPA가 CPU 사용률(%)을 계산하려면 requests가 필요(없으면 product HPA가 스케일 못 함).
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
          # ── f2 결함: 과도 권한 파드(privileged) ──
          securityContext:
            privileged: true # ❌ 의도적 결함(KSPM) — 컨테이너 탈출 발판
          volumeMounts:
            - name: host-root
              mountPath: /host # ❌ hostPath 마운트(KSPM)
      volumes:
        - name: host-root
          hostPath:
            path: / # ❌ 노드 루트 파일시스템 노출
