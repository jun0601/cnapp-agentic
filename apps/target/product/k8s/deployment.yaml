# product Deployment — 골든 시나리오 '진입점'.
# 의도적 결함 f2 (INTERNAL-KSPM-PRIVILEGED-001): privileged + hostPath.
#   kube-bench / trivy-k8s(KSPM)가 이 파드를 탐지.
#   ⚠️ 데모 전용 결함. 실서비스 금지. 토글 = 이 매니페스트 적용 여부.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: shop
  labels: { app: product }
spec:
  replicas: 1
  selector:
    matchLabels: { app: product }
  template:
    metadata:
      labels: { app: product }
    spec:
      containers:
        - name: product
          # f1: KEV 취약 이미지(product/Dockerfile로 빌드, build-images.yml이 push)
          image: "066107819776.dkr.ecr.ap-northeast-2.amazonaws.com/cnapp-agentic/product:latest"
          # placeholder 파드 keep-alive. (product는 스캔 대상 이미지가 목적이지 기능 서비스가 아님)
          # 현재 ECR 이미지는 Dockerfile exec-form 함정으로 CMD가 깨져 있어(수정 커밋됨, 재빌드 전)
          # 명시적 command로 우회. 이미지 재빌드 후엔 이 줄 없어도 동작.
          command: ["sleep", "infinity"]
          ports: [{ containerPort: 8080 }]
          # ── f2 결함: 과도 권한 파드(privileged) ──
          securityContext:
            privileged: true # ❌ 의도적 결함(KSPM) — 컨테이너 탈출 발판
          volumeMounts:
            - name: host-root
              mountPath: /host # ❌ hostPath 마운트(KSPM)
      volumes:
        - name: host-root
          hostPath:
            path: / # ❌ 노드 루트 파일시스템 노출
