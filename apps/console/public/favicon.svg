<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- CNAPP 관제 — 방패(보안) 안에 크로스클라우드 attack-path. 작은 크기에서도 읽히게 크고 굵게. -->
  <path d="M16 1 L29.5 5.6 V15 C29.5 23.8 23.6 28.9 16 31.5 C8.4 28.9 2.5 23.8 2.5 15 V5.6 Z"
        fill="#0f172a"/>
