name: azure-login-alert

# Entra ID(Azure) 로그인 감지 → 기존 cnapp-login Teams 채널에 알림(AWS 콘솔 로그인 알림과 같은 채널).
# AWS 쪽(login_notifier)은 CloudTrail 구독 필터로 이벤트 기반인데, Azure는 그런 값싼 이벤트 기반
# 경로가 없어서(Log Analytics+Azure Monitor 알림은 별도 유료 리소스 필요) 대신 짧은 주기로
# Microsoft Graph 로그인 로그(auditLogs/signIns)를 폴링하는 방식으로 근사.
#
# 인증(둘 다 키리스 OIDC, D4, prowler-scan.yml과 동일 자격증명 재사용 — 새 앱 등록 불필요):
#   Azure — cnapp-agentic-prowler-sp의 Federated Credential(AuditLog.Read.All 권한 이미 있음)
#   AWS   — infra/shared의 github-ci 역할(OIDC) — Teams 웹훅 URL을 Secrets Manager에서 읽기 위함만
#
# 중복 알림 방지: 상태 저장소 없이 "조회 주기보다 넉넉히 긴 창"(45분, 주기의 3배)으로 최근
# 로그인만 봄 — 겹치는 구간에서 드물게 중복 알림이 갈 수 있으나(로그인 알림 특성상 허용
# 가능한 수준), 상태 관리 인프라(DynamoDB 등)를 새로 만드는 것보다 훨씬 단순함.
# ⚠️ 창을 주기(15분)보다 넉넉히 크게 잡은 이유: GitHub Actions의 schedule 트리거는 저장소
# 활동이 적으면 지연되거나 스킵될 수 있다고 공식 문서화돼 있음 — 창이 주기와 같으면 스킵된
# 회차의 로그인을 완전히 놓칠 수 있어서(중복보다 훨씬 나쁨), 안전마진을 넉넉히 둠.
#
# 🔴 2026-07-08 실측: 이 워크플로는 영구히 실패한다 — Microsoft Graph의 auditLogs/signIns
# 엔드포인트는 **Azure AD Premium P1/P2 라이선스가 없으면 호출 자체가 거부**된다(HTTP 403,
# error.code=Authentication_RequestFromNonPremiumTenantOrB2CTenant). 이 테넌트는 M365
# Business 체험판(Premium 미포함)이라 코드로 우회 불가능한 라이선스 벽 — Defender for
# Cloud(2026-07-07)·Prowler Azure 구독 문제(2026-07-08)와 같은 패턴. 대안 directoryAudits
# 엔드포인트도 검토했으나 관리작업 로그만 있고 실제 로그인 IP·앱·결과 정보가 없어 대체 불가.
# → **콘솔 SSO 로그인 알림은 대신 `apps/console-backend/src/login-trigger.ts`(Cognito
# Post-Authentication 트리거)에서 직접 처리**(Entra API를 전혀 안 거쳐 라이선스 제약 자체가
# 적용 안 됨, 이벤트 기반이라 폴링보다 정확). schedule을 꺼서 매 15분 빨간 실패를 막고,
# workflow_dispatch만 남겨둔다(나중에 Premium 라이선스를 구매하면 schedule 한 줄만 복원하면
# 됨 — 코드 자체는 그대로 유효). 상세는 troubleshooting.md.

on:
  # schedule: 라이선스 벽으로 영구 실패라 비활성화(위 설명). Premium 구매 시 아래 주석 해제.
  #   - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  # cnapp-agentic-prowler-sp (docs/manual-infra.md §3.6, AuditLog.Read.All 보유)
  AZURE_CLIENT_ID: 82fec3e9-4c20-4d78-bf4a-9e518a86b460
  AZURE_TENANT_ID: 8e160cea-faa9-47de-a717-6eb01e4a262b
  WEBHOOK_SECRET_ID: cnapp-agentic/teams/webhook-login

jobs:
  check-logins:
    name: Azure 로그인 감지 → Teams
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC, keyless) — 웹훅 URL 읽기용
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::066107819776:role/cnapp-agentic-github-ci"
          aws-region: ${{ env.AWS_REGION }}

      - name: 인프라 활성 여부 확인(monitoring destroy 상태면 조용히 skip)
        id: check
        run: |
          if aws secretsmanager get-secret-value --secret-id "${WEBHOOK_SECRET_ID}" --query SecretString --output text >/tmp/webhook_url 2>/dev/null; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "::notice::infra/monitoring이 destroy 상태로 보임(시크릿 없음) — 스킵"
          fi

      - name: Azure 로그인(OIDC, 키리스)
        if: steps.check.outputs.active == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign-in 로그 조회 → 신규 로그인만 Teams로 전송
        if: steps.check.outputs.active == 'true'
        run: |
          set -e
          # ⚠️ 2026-07-08 실측 버그 수정(진짜 원인): "exit 3, 출력 0줄"의 정체는 az/python이 아니라
          # curl 자체였다 — curl의 exit 3 = "URL malformed"(공식 exit code 표), $filter 쿼리스트링에
          # 있던 리터럴 공백("createdDateTime ge ${SINCE}")이 원인. curl -f가 네트워크 호출 전에
          # URL 파싱 단계에서 즉시 거부해 밀리초 만에 죽고 아무 출력도 안 남긴 것(체감상 "조용한
          # 실패"로 보였을 뿐). 공백을 %20으로 URL-인코딩해 해결. --tenant 추가(구독 컨텍스트
          # 의존 제거)는 부수적으로 유효한 개선이라 유지.
          TOKEN=$(az account get-access-token --tenant "${AZURE_TENANT_ID}" --resource https://graph.microsoft.com --query accessToken -o tsv)
          SINCE=$(date -u -d '45 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          export WEBHOOK_URL=$(cat /tmp/webhook_url)
          rm -f /tmp/webhook_url

          HTTP_CODE=$(curl -s -o signins.json -w "%{http_code}" -H "Authorization: Bearer ${TOKEN}" \
            "https://graph.microsoft.com/v1.0/auditLogs/signIns?\$filter=createdDateTime%20ge%20${SINCE}&\$top=50&\$orderby=createdDateTime")
          echo "graph http status: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "--- error body ---"; cat signins.json
            exit 1
          fi

          python3 - <<'PYEOF'
          import json, os, datetime, urllib.request

          with open("signins.json", encoding="utf-8") as f:
              data = json.load(f)

          webhook = os.environ["WEBHOOK_URL"]
          kst = datetime.timezone(datetime.timedelta(hours=9))

          for item in data.get("value", []):
              user = item.get("userPrincipalName", "unknown")
              app = item.get("appDisplayName", "unknown")
              ip = item.get("ipAddress", "unknown")
              err = (item.get("status") or {}).get("errorCode", 0)
              created = item.get("createdDateTime", "")
              try:
                  dt = datetime.datetime.strptime(created, "%Y-%m-%dT%H:%M:%S.%fZ" if "." in created else "%Y-%m-%dT%H:%M:%SZ")
                  when = dt.replace(tzinfo=datetime.timezone.utc).astimezone(kst).strftime("%Y-%m-%d %H:%M:%S") + " KST"
              except ValueError:
                  when = created
              emoji = "✅" if err == 0 else "⚠️"
              result = "Success" if err == 0 else f"Failed(code {err})"
              text = (
                  f"<b>\U0001F510 Azure(Entra ID) 로그인 감지</b><br><br>"
                  f"사용자: <b>{user}</b><br>앱: {app}<br>결과: {emoji} {result}<br>"
                  f"IP: {ip}<br>시각(KST): {when}"
              )
              req = urllib.request.Request(
                  webhook,
                  data=json.dumps({"text": text}).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              urllib.request.urlopen(req, timeout=10)
              print(f"notified: {user} {when}")

          if not data.get("value"):
              print("no sign-ins in window")
          PYEOF
