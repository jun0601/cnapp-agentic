name: contracts-validate

# contracts/ 정합 검증 게이트 (target-app-design §2.1).
# contracts/* 가 바뀌는 PR·push 에서 4-assert + JSON 유효성 검사 → 실패 시 머지 차단.

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-validate.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate contracts
        run: python contracts/validate.py
